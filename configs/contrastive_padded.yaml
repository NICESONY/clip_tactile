# B Padded: Contrastive retrieval (letterbox padding)
# python contrastive_train.py --config configs/contrastive_padded.yaml

experiment_name: clip_contrastive_padded

model:
  pretrained_model_name: openai/clip-vit-base-patch32
  freeze_image_encoder: false
  freeze_text_encoder: false
  learnable_temperature: true
  init_temperature: 0.07

train:
  epochs: 300
  batch_size: 64
  lr: 0.00001
  weight_decay: 0.01
  num_workers: 4
  save_dir: outputs/clip_contrastive_padded

eval:
  candidate_pool: all
  top_k: [1, 5]

data:
  label_cols: ["dX", "dY", "dZ", "Fx", "Fy", "Fz"]
  train_csv: data/processed/train_labels_normalized.csv
  train_image_dir: data/train/images_padded
  val_csv: data/processed/val_labels_normalized.csv
  val_image_dir: data/val/images_padded
  test_csv: data/processed/test_labels_normalized.csv
  test_image_dir: data/test/images_padded
  label_stats: data/processed/label_stats.json
  image_stats: data/processed/image_stats_padded.json
