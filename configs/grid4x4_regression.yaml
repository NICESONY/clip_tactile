# Grid 4x4: Regression (셀 평균 라벨)
# python train.py --config configs/grid4x4_regression.yaml

experiment_name: grid4x4_regression

model:
  pretrained_model_name: openai/clip-vit-base-patch32
  output_dim: 6
  hidden_dim: 256
  dropout: 0.1
  freeze_strategy: all

train:
  epochs: 300
  batch_size: 8
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 4
  image_size: 224
  save_dir: outputs/grid4x4_regression

data:
  train_csv: data/processed/grid4x4_train_normalized.csv
  train_image_dir: data/train/images
  val_csv: data/processed/grid4x4_val_normalized.csv
  val_image_dir: data/val/images
  test_csv: data/processed/grid4x4_test_normalized.csv
  test_image_dir: data/test/images
  label_stats: data/processed/grid4x4_label_stats.json
